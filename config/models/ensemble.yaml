# config/models/ensemble.yaml
# Hiperparametros del modelo Ensemble (Prophet Base + XGBoost sobre residuos).
# Target: conteos absolutos (incrementos), NO tasa por 100k.

prophet_base:
  changepoint_prior_scale: 0.05
  seasonality_prior_scale: 0.1
  seasonality_mode: additive
  yearly_custom:
    period: 365.25
    fourier_order: 10

xgboost:
  n_estimators: 200
  max_depth: 3
  learning_rate: 0.03
  subsample: 0.8
  colsample_bytree: 0.7
  min_child_weight: 5
  reg_alpha: 0.1
  reg_lambda: 1.0

oof_residual_folds: 3  # 0 = legacy in-sample

# Modo: "parallel" (Prophet + XGBDirect con pesos) o "sequential" (legacy residual)
ensemble_mode: "parallel"
parallel_alpha: 1.0
parallel_oof_folds: 4
parallel_oof_cutoff: "2024-01-01"
parallel_min_train_weeks: 104

FECHA_CORTE_ENTRENAMIENTO_ENSEMBLE: "2025-01-01"
HORIZON_ENSEMBLE: 52

# Grid search para XGBoost (CV temporal sobre residuos Prophet)
param_grid_xgboost:
  max_depth: [3, 4, 5]
  learning_rate: [0.01, 0.03, 0.05]
  subsample: [0.7, 0.8]
  min_child_weight: [5, 10]

xgb_cv_splits: 4
xgb_cv_test_size: 26
xgb_early_stopping_rounds: 15
xgb_n_estimators_max: 500
