modelo_activo: "ensemble"         # Opciones: prophet, deepar, ensemble, stacking

padecimiento:
  columna: "Padecimiento"
  tipo: "General"                  # General, Depresión, Parkinson, Alzheimer
  force: true                      # Sobrescribe el filtrado previo
  reporte: false                   # Genera reporte de filtrado
  reporte_clean: True              # Genera reporte de datos tratados
  modelado_estados: True           # Genera modelos por estados (true) o región (false)
  modelado_hibrido: True           # Fallback regional para estados insuficientes (solo con modelado_estados)
  solo_nacional: False             # True = solo modelos nacionales (skip regionales/estatales)
  entrena_modelo: True             # Entrena modelo final con todo el dataset

inegi:
  force: false                     # Sobrescribe el archivo INEGI aunque ya exista

prediccion:
  periodo: 52                      # Semanas a predecir por modelo

# ---------------------------------------------------------------------------
# Rutas del sistema de archivos (integradas desde config/_legacy/rutas.yaml)
# ---------------------------------------------------------------------------
paths:
  data: "./data"
  raw: "${paths.data}/raw"
  interim: "${paths.data}/interim"
  processed: "${paths.data}/processed"
  external: "${paths.data}/external"
  prediction: "${paths.data}/prediction"
  synthetic: "${paths.data}/synthetic"
  models: "./models/${modelo_activo}"
  reports: "./reports"
  figures: "${paths.reports}/figures"
  forecast: "${paths.reports}/forecasts/${modelo_activo}"
  docs: "${paths.reports}/docs"
  utils: "${paths.data}/utils"

download:
  dataset_id: "1zFpeQewhh-otoCSMo0OoTc5yGzQlCxRv?"
  cookies: "use_cookies"
  force: False  # True: fuerza la descarga; si el RAW existe, se elimina y se vuelve a descargar

data:
  boletin: "${paths.processed}/dataset_boletin_epidemiologico.csv"
  raw_data_file: "${paths.raw}/data_raw.csv"
  raw_data_filter: "${paths.raw}/data_raw_${padecimiento.tipo}.csv"
  interim_data_file: "${paths.interim}/data_clean.csv"
  interim_stage_transformed: "${paths.interim}/data_stage_transformed.csv"
  data_prepare: "${paths.processed}/data_prepare_${padecimiento.tipo}.csv"
  inegi: "${paths.utils}/inegi.csv"
  data_inegi: "${paths.processed}/data_inegi_${padecimiento.tipo}.csv"
  xlsx_inegi: "${paths.processed}/EpiForecast-MX.xlsx"
  model_train: "${paths.models}/"
  forecast: "${paths.forecast}/all_forecast_${modelo_activo}.csv"
  tableau: "${paths.processed}/tableau.csv"
