opciones_FE:
  - tratamiento_outliers:
      IQR: True
      metodo: 'zscore' # 'zscore', 'IQR'
      columnas:
        - Incremento_hombres
        - Incremento_mujeres
      umbral: 3
      reemplazo: "mediana" # None, 'media', 'mediana' o 'cercano'
      agrupacion:
        - Padecimiento
        - Entidad
      # Padecimientos exentos del recorte de outliers: en una arbovirosis como el
      # Dengue, el pico epidemico ES la senal a pronosticar, no ruido a medianizar.
      excluir_padecimientos:
        - Dengue

  - agrupa:
      valor: Sexo

regiones:
