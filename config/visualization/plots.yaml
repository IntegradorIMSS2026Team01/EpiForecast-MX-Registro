reporte_filtrado:
  filtro_padecimiento: "${padecimiento.tipo}"
  nombre_reporte: "EDA_${reporte_filtrado.filtro_padecimiento}"
  titulo_reporte: "Análisis Exploratorio de Datos"
  subtitulo_reporte: "Padecimiento: ${padecimiento.tipo} (RAW Data)"
  violin: True
  max_cols: 33  #limita el número de variables que se visualizarán en la gráfica
  carpeta: "${paths.docs}"
  ruta: "${paths.docs}/${reporte_filtrado.nombre_reporte}.pdf"
  COLS_NUMERICAS:
    - "Anio"
    - "Semana"
    - "Casos_semana"
    - "Acumulado_hombres"
    - "Acumulado_mujeres"
    - "Acumulado_anio_anterior"
  COLS_CATEGORICAS:
    - "Entidad"
    - "Padecimiento"


reporte_clean_dataset:
  filtro_padecimiento: "${padecimiento.tipo}"
  nombre_reporte: "EDA_${padecimiento.tipo} (Clean Data)"
  titulo_reporte: "Análisis Exploratorio de Datos"
  subtitulo_reporte: "Padecimiento: ${padecimiento.tipo} (Clean Data)"
  violin: True
  max_cols: 33
  carpeta: "${paths.docs}"
  ruta: "${paths.docs}/${reporte_clean_dataset.nombre_reporte}.pdf"
  COLS_NUMERICAS:
    - "Anio"
    - "Semana"
    - "Acumulado_hombres"
    - "Acumulado_mujeres"
  COLS_CATEGORICAS:
    - "Entidad"
    - "Padecimiento"


# --- Paleta IMSS institucional (Guía cromática oficial 2026) ----------------------
IMSS_COLORS:
  neutral_black: "#231F20"   # PANTONE Neutral Black C
  burgundy: "#9B2242"        # PANTONE 7420 C
  dark_burgundy: "#6F1D46"   # PANTONE 7421 C
  cool_gray: "#97999B"       # PANTONE Cool Gray C
  teal: "#00524E"            # PANTONE IMSS 561 C
  dark_teal: "#173F35"       # PANTONE 627 C
  cream: "#E8D5B5"           # PANTONE 7402 C
  gold: "#B58500"            # PANTONE 1255 C

# Paleta secuencial para gráficos
PALETTE_MAIN:
  - "#00524E"   # teal
  - "#9B2242"   # burgundy
  - "#B58500"   # gold
  - "#173F35"   # dark_teal
  - "#6F1D46"   # dark_burgundy
  - "#97999B"   # cool_gray
  - "#231F20"   # neutral_black
  - "#E8D5B5"   # cream

PALETTE_PADECIMIENTO:
  Depresion:             # sin acento → coincide con nombre normalizado de modelos
    c1: "#9B2242"        # burgundy (línea principal)
    cl: "#D4758B"        # burgundy claro (banda)
  Parkinson:
    c1: "#00524E"        # teal (línea principal)
    cl: "#4A9E9A"        # teal claro (banda)
  Alzheimer:
    c1: "#B58500"        # gold (línea principal)
    cl: "#D4B24A"        # gold claro (banda)

COVID:
  inicio: "2020-03-15"  # Inicio confinamiento México
  fin: "2022-09-22"     # Fin confinamiento estricto

PALETTE_SEXO:
  Hombres: "#00524E"     # teal
  Mujeres: "#9B2242"     # burgundy

# --- Estilo global de matplotlib ---------------------------------------------
matplotlib_rcParams:
  figure.facecolor: "white"
  axes.facecolor: "white"
  axes.edgecolor: "#97999B"        # cool_gray
  axes.labelcolor: "#231F20"       # neutral_black
  text.color: "#231F20"            # neutral_black
  xtick.color: "#231F20"           # neutral_black
  ytick.color: "#231F20"           # neutral_black
  axes.grid: true
  grid.alpha: 0.3
  grid.color: "#97999B"            # cool_gray
  font.family: "sans-serif"
  font.size: 11
  axes.titlesize: 13
  axes.titleweight: "bold"
  figure.titlesize: 15
  figure.titleweight: "bold"
  figure.dpi: 120
  savefig.dpi: 150
  savefig.bbox: "tight"
